services:
  backend:
    build: .
    ports: 
      - 8000:8000
    env_file: .env
    depends_on:
      - db

  db:
    image: postgres
    container_name: cityscope-postgres
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"