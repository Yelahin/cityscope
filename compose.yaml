services:
  backend:
    container_name: cityscope-backend
    build: .
    ports: 
      - 8000:8000
    env_file: .env
    depends_on:
      db:
        condition: service_healthy


  db:
    image: postgres
    container_name: cityscope-postgres
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5